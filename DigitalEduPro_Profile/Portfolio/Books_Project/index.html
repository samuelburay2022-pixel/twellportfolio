<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books I Created | Project Brief</title>
    <meta name="description" content="Project brief for books created by Samuel Jr. Pana Buray." />
    <style>
      :root {
        --ink: #0f172a;
        --muted: #475569;
        --line: #cfe0f0;
        --line-strong: #aac7e0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(2, 132, 199, 0.14), transparent 34%),
          linear-gradient(180deg, #f8fbff 0%, #edf5ff 100%);
      }

      .topbar {
        position: sticky;
        top: 0.62rem;
        z-index: 10;
        width: min(1080px, calc(100% - 1.2rem));
        margin: 0.62rem auto 0;
        padding: 0.66rem 0.82rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(248, 252, 255, 0.9);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
      }

      .brand {
        font-size: 0.79rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.2rem;
        padding: 0.4rem 0.82rem;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: #15486d;
        font-weight: 700;
        text-decoration: none;
      }

      .layout {
        width: min(1080px, calc(100% - 1.2rem));
        margin: 0.9rem auto 1.8rem;
        display: grid;
        gap: 0.9rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, #ffffff, #f7fbff);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      .hero {
        padding: clamp(1rem, 2.5vw, 1.7rem);
        display: grid;
        gap: 0.8rem;
      }

      .eyebrow {
        color: #0284c7;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .books-grid {
        padding: 1rem;
        display: grid;
        gap: 0.8rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .book-card {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: #ffffff;
        display: grid;
      }

      .book-card img {
        width: 100%;
        aspect-ratio: 4 / 5;
        object-fit: cover;
        display: block;
      }

      .book-card img.horizontal {
        aspect-ratio: 16 / 9;
        object-fit: contain;
        background: #edf6ff;
      }

      .book-meta {
        padding: 0.72rem 0.76rem 0.86rem;
        display: grid;
        gap: 0.38rem;
      }

      .book-meta p {
        font-size: 0.92rem;
      }

      @media (max-width: 860px) {
        .books-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .topbar {
          position: static;
          flex-direction: column;
          align-items: flex-start;
        }

        .books-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Books I Created</span>
      <a class="button" href="../index.html#projects">Back to Portfolio</a>
    </header>

    <main class="layout">
      <section class="card hero">
        <p class="eyebrow">Personal Project</p>
        <h1>Books I Created</h1>
        <p>
          Selected classroom-focused book projects developed to support student confidence,
          computational thinking, and early-years learning.
        </p>
      </section>

      <section class="card">
        <div class="books-grid">
          <figure class="book-card">
            <img class="horizontal" src="../Books/Rise and Boss.jpg" alt="Rise and Boss book cover" loading="lazy" />
            <figcaption class="book-meta">
              <h3>Rise and Boss</h3>
              <p>
                Student-centered motivational book designed to build confidence, leadership, and
                a growth mindset.
              </p>
            </figcaption>
          </figure>
          <figure class="book-card">
            <img
              src="../Books/ComputationalThinkingSkill.jpg"
              alt="Computational Thinking Skill book cover"
              loading="lazy"
            />
            <figcaption class="book-meta">
              <h3>Computational Thinking Skill</h3>
              <p>
                Activity-based learning book that strengthens logic, sequencing, and
                problem-solving in young learners.
              </p>
            </figcaption>
          </figure>
          <figure class="book-card">
            <img src="../Books/NurseryEssentials.jpg" alt="Nursery Essentials book cover" loading="lazy" />
            <figcaption class="book-meta">
              <h3>Nursery Essentials</h3>
              <p>
                Early years teaching resource supporting foundational skills, routines, and
                age-appropriate classroom engagement.
              </p>
            </figcaption>
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
