<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teaching Innovation and Application | Project Brief</title>
    <meta
      name="description"
      content="Project brief for teaching innovation and classroom application work."
    />
    <style>
      :root {
        --ink: #0f172a;
        --muted: #475569;
        --line: #cfe0f0;
        --line-strong: #aac7e0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(2, 132, 199, 0.14), transparent 34%),
          linear-gradient(180deg, #f8fbff 0%, #edf5ff 100%);
      }

      .topbar {
        position: sticky;
        top: 0.62rem;
        z-index: 10;
        width: min(1080px, calc(100% - 1.2rem));
        margin: 0.62rem auto 0;
        padding: 0.66rem 0.82rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(248, 252, 255, 0.9);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
      }

      .brand {
        font-size: 0.79rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.2rem;
        padding: 0.4rem 0.82rem;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: #15486d;
        font-weight: 700;
        text-decoration: none;
      }

      .layout {
        width: min(1080px, calc(100% - 1.2rem));
        margin: 0.9rem auto 1.8rem;
        display: grid;
        gap: 0.9rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, #ffffff, #f7fbff);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      .hero {
        padding: clamp(1rem, 2.5vw, 1.7rem);
        display: grid;
        gap: 0.8rem;
      }

      .eyebrow {
        color: #0284c7;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .gallery {
        padding: 1rem;
        display: grid;
        gap: 0.8rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .item {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: #ffffff;
        display: grid;
      }

      .item img {
        width: 100%;
        display: block;
        height: clamp(260px, 38vw, 520px);
        object-fit: contain;
        background: #edf6ff;
      }

      .item figcaption {
        padding: 0.72rem 0.76rem 0.86rem;
        font-size: 0.92rem;
      }

      @media (max-width: 640px) {
        .topbar {
          position: static;
          flex-direction: column;
          align-items: flex-start;
        }

        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Teaching Innovation and Application</span>
      <a class="button" href="../index.html#projects">Back to Portfolio</a>
    </header>

    <main class="layout">
      <section class="card hero">
        <p class="eyebrow">Personal Project</p>
        <h1>Teaching Innovation and Application</h1>
        <p>
          Classroom project visuals showing how innovation ideas are translated into practical
          teaching applications and student outcomes.
        </p>
      </section>

      <section class="card">
        <div class="gallery">
          <figure class="item">
            <img
              src="../assets/photos/teacher-innovation.png"
              alt="Teaching innovation project visual"
              loading="lazy"
            />
            <figcaption>Teaching Innovation: designed strategies for engaging modern learners.</figcaption>
          </figure>
          <figure class="item">
            <img
              src="../assets/photos/teacher-application.png"
              alt="Teaching application project visual"
              loading="lazy"
            />
            <figcaption>
              Teaching Application: practical classroom implementation and learner outcomes.
            </figcaption>
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
