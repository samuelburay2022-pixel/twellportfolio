name: Update Analytics Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  update-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade google-auth requests

      - name: Resolve GA config
        env:
          GA_PROPERTY_ID_SECRET: ${{ secrets.GA_PROPERTY_ID }}
          GA_PROPERTY_ID_VAR: ${{ vars.GA_PROPERTY_ID }}
          GA_MEASUREMENT_ID_SECRET: ${{ secrets.GA_MEASUREMENT_ID }}
          GA_MEASUREMENT_ID_VAR: ${{ vars.GA_MEASUREMENT_ID }}
          GA_SERVICE_ACCOUNT_JSON_SECRET: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
          GA_SERVICE_ACCOUNT_JSON_VAR: ${{ vars.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          ga_property_id="${GA_PROPERTY_ID_SECRET:-$GA_PROPERTY_ID_VAR}"
          ga_measurement_id="${GA_MEASUREMENT_ID_SECRET:-$GA_MEASUREMENT_ID_VAR}"
          ga_service_account_json="${GA_SERVICE_ACCOUNT_JSON_SECRET:-$GA_SERVICE_ACCOUNT_JSON_VAR}"

          if [ -z "$ga_property_id" ]; then
            echo "::error::Missing GA_PROPERTY_ID. Add it in GitHub Secrets or Variables."
            exit 1
          fi
          if [ -z "$ga_service_account_json" ]; then
            echo "::error::Missing GA_SERVICE_ACCOUNT_JSON. Add it in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "$ga_measurement_id" ]; then
            ga_measurement_id="G-QRQJVRGK5M"
            echo "::notice::GA_MEASUREMENT_ID not set. Using default $ga_measurement_id."
          fi

          {
            echo "GA_PROPERTY_ID=$ga_property_id"
            echo "GA_MEASUREMENT_ID=$ga_measurement_id"
            echo "GA_SERVICE_ACCOUNT_JSON<<EOF"
            echo "$ga_service_account_json"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Fetch GA summary
        run: python3 scripts/fetch_ga_summary.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/analytics-summary.json; then
            echo "No analytics changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analytics-summary.json
          git commit -m "Update analytics summary data"
          git push
